# XcodeGen — Mac cloud : brew install xcodegen && cd game/LostPhone && xcodegen generate
name: LostPhone
options:
  bundleIdPrefix: com.lostphone
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  LostPhone:
    type: application
    platform: iOS
    sources:
      - path: LostPhone
        excludes:
          - "**/Info.plist"
          - "**/Resources/stories/**"
    resources:
      # Folder reference preserves stories/<id>/lpsp.json (avoids flattening duplicate lpsp.json).
      - path: LostPhone/Resources/stories
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lostphone.game
        INFOPLIST_FILE: LostPhone/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
    scheme:
      testTargets: []
