# Codemagic — build iOS sans Mac local
# LostPhone Studio — workflow actif : lost-phone-swiftui uniquement
# Legacy Capacitor : archive/config-duplicates/codemagic-capacitor-legacy.yaml

workflows:
  lost-phone-swiftui:
    name: Lost Phone SwiftUI
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic

    environment:
      ios_signing:
        certificates:
          - codemagic_certificate
        provisioning_profiles:
          - codemagic_profile
      vars:
        BUNDLE_ID: "com.lostphone.game"
        PROFILE_NAME: "Lost Phone App Store"
        PROFILES_DIR: "$HOME/Library/MobileDevice/Provisioning Profiles"
      xcode: latest

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
        - pattern: swiftui
          include: true
        - pattern: cursor/vendored-clones-a052
          include: true
        - pattern: "cursor/**"
          include: true

    scripts:
      - name: Install XcodeGen
        script: |
          chmod +x LostPhone/scripts/install-xcodegen.sh
          LostPhone/scripts/install-xcodegen.sh

      - name: Skip macro validation (vendored SwiftUI @Entry)
        script: defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES

      - name: Sync LPSP stories
        script: |
          mkdir -p LostPhone/LostPhone/Resources/stories
          cp -R public/stories/* LostPhone/LostPhone/Resources/stories/

      - name: iOS build preflight
        script: |
          chmod +x LostPhone/scripts/ios-build-preflight.sh
          LostPhone/scripts/ios-build-preflight.sh

      - name: Generate Xcode project
        script: |
          cd LostPhone
          xcodegen generate

      - name: Ensure App Store provisioning profile
        script: |
          set -e
          mkdir -p "$PROFILES_DIR"
          export PROFILES_DIRECTORY="$PROFILES_DIR"
          PROFILE_JSON=$(app-store-connect profiles list \
            --type IOS_APP_STORE \
            --name "$PROFILE_NAME" \
            --state ACTIVE \
            --json)
          if [ "$PROFILE_JSON" = "[]" ]; then
            BUNDLE_ID_RES=$(app-store-connect bundle-ids list \
              --bundle-id-identifier "$BUNDLE_ID" \
              --strict-match-identifier \
              --json | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['id'])")
            CERT_ID=$(app-store-connect certificates list \
              --type IOS_DISTRIBUTION \
              --json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['id'])")
            app-store-connect profiles create "$BUNDLE_ID_RES" \
              --type IOS_APP_STORE \
              --name "$PROFILE_NAME" \
              --certificate-ids "$CERT_ID" \
              --save
          else
            app-store-connect profiles list \
              --type IOS_APP_STORE \
              --name "$PROFILE_NAME" \
              --state ACTIVE \
              --save
          fi

      - name: Set up code signing
        script: |
          xcode-project use-profiles \
            --project LostPhone/LostPhone.xcodeproj \
            --custom-export-options='{"testFlightInternalTestingOnly": true}'

      - name: Build IPA
        script: |
          cd LostPhone
          xcode-project build-ipa \
            --project "LostPhone.xcodeproj" \
            --scheme "LostPhone"

    artifacts:
      - LostPhone/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
