# Aperçu SwiftUI sans Mac et sans Apple Developer.
# GitHub → Actions → "iOS Preview (Simulator)" → Run workflow
#
# Artifacts: LostPhone-simulator.app.zip (Appetize) + PNG/MOV si simulateur OK

name: iOS Preview (Simulator)

on:
  push:
    branches: [main]
    paths:
      - "LostPhone/**"
      - "public/stories/**"
      - ".github/workflows/ios-preview.yml"
  workflow_dispatch:
    inputs:
      simulator:
        description: "Simulateur préféré (vide = auto). Ex: iPhone 15 Pro"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  preview:
    name: Build simulator + captures
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build & capture
        env:
          IOS_SIMULATOR_NAME: ${{ github.event.inputs.simulator }}
        run: |
          chmod +x LostPhone/scripts/ios-preview-capture.sh
          LostPhone/scripts/ios-preview-capture.sh "$GITHUB_WORKSPACE/preview-artifacts"

      - name: Publish preview (Release)
        run: |
          gh release delete preview-latest -y 2>/dev/null || true
          gh release create preview-latest \
            preview-artifacts/LostPhone-simulator.app.zip \
            preview-artifacts/preview-demo.mov \
            preview-artifacts/01-menu-accueil.png \
            --title "Preview Lost Phone — vidéo + app" \
            --notes "$(cat <<'EOF'
## Voir l'app sans Appetize (recommandé)

1. Télécharge **`preview-demo.mov`** — vidéo 15 s du simulateur iOS (menu + navigation)
2. Ou **`01-menu-accueil.png`** — capture écran

## Appetize (souvent écran noir sur iPhone)

- Utilise **Chrome sur PC/Mac**, pas Safari sur iPhone
- OS : **iOS 17.2**, Device : iPhone 14 Pro
- Upload **`LostPhone-simulator.app.zip`** sans dézipper
- PIN : **1503**
EOF
)"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish Appetize zip alias (legacy tag)
        run: |
          gh release delete appetize-latest -y 2>/dev/null || true
          gh release create appetize-latest \
            preview-artifacts/LostPhone-simulator.app.zip \
            --title "Appetize — zip simulateur" \
            --notes "Voir plutôt **preview-latest** pour la vidéo. Appetize : PC/Mac + iOS 17.2. PIN **1503**."
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload Appetize zip (upload THIS file to appetize.io)
        uses: actions/upload-artifact@v4
        with:
          name: appetize-upload-${{ github.run_number }}
          path: |
            preview-artifacts/LostPhone-simulator.app.zip
            preview-artifacts/APPETIZE-LISEZMOI.txt
          retention-days: 30
          if-no-files-found: error

      - name: Job summary
        run: |
          {
            echo "## Preview Lost Phone"
            echo ""
            echo "**Sans Appetize (recommandé)** : [preview-latest Release](https://github.com/${{ github.repository }}/releases/tag/preview-latest) → \`preview-demo.mov\`"
            echo ""
            echo "**Appetize** (PC/Mac uniquement) : [appetize-latest](https://github.com/${{ github.repository }}/releases/tag/appetize-latest) · iOS **17.2** · PIN **1503**"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload preview artifacts (screenshots + full bundle)
        uses: actions/upload-artifact@v4
        with:
          name: ios-swiftui-preview-${{ github.run_number }}
          path: preview-artifacts/
          retention-days: 30
          if-no-files-found: error
