# Aperçu SwiftUI sans Mac et sans Apple Developer.
# GitHub → Actions → "iOS Preview (Simulator)" → Run workflow
#
# Artifacts: LostPhone-simulator.app.zip (Appetize) + PNG/MOV si simulateur OK

name: iOS Preview (Simulator)

on:
  push:
    branches: [main]
    paths:
      - "LostPhone/**"
      - "public/stories/**"
      - ".github/workflows/ios-preview.yml"
  workflow_dispatch:
    inputs:
      simulator:
        description: "Simulateur préféré (vide = auto). Ex: iPhone 15 Pro"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  preview:
    name: Build simulator + captures
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build & capture
        env:
          IOS_SIMULATOR_NAME: ${{ github.event.inputs.simulator }}
        run: |
          chmod +x LostPhone/scripts/ios-preview-capture.sh
          LostPhone/scripts/ios-preview-capture.sh "$GITHUB_WORKSPACE/preview-artifacts"

      - name: Publish direct Appetize download (Releases)
        run: |
          gh release delete appetize-latest -y 2>/dev/null || true
          gh release create appetize-latest \
            preview-artifacts/LostPhone-simulator.app.zip \
            --title "Appetize — dernier build iOS" \
            --notes "**Télécharge \`LostPhone-simulator.app.zip\` ci-dessous** et uploade-le sur [appetize.io](https://appetize.io) **sans le dézipper**. PIN : **1503**."
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload Appetize zip (upload THIS file to appetize.io)
        uses: actions/upload-artifact@v4
        with:
          name: appetize-upload-${{ github.run_number }}
          path: |
            preview-artifacts/LostPhone-simulator.app.zip
            preview-artifacts/APPETIZE-LISEZMOI.txt
          retention-days: 30
          if-no-files-found: error

      - name: Job summary
        run: |
          {
            echo "## Appetize — comment tester"
            echo ""
            echo "1. **[Télécharger LostPhone-simulator.app.zip (Release)](https://github.com/${{ github.repository }}/releases/tag/appetize-latest)**"
            echo "2. Upload ce fichier sur [appetize.io](https://appetize.io) **sans le dézipper**"
            echo "3. PIN : **1503** · Histoire : **J-3**"
            echo ""
            echo "⚠️ Si Appetize dit « No .app folder found », tu as uploadé le mauvais zip (celui de l'artifact GitHub entier). Utilise le lien Release ci-dessus."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload preview artifacts (screenshots + full bundle)
        uses: actions/upload-artifact@v4
        with:
          name: ios-swiftui-preview-${{ github.run_number }}
          path: preview-artifacts/
          retention-days: 30
          if-no-files-found: error
