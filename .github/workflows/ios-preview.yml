# Aperçu SwiftUI sans Mac et sans Apple Developer.
# GitHub → Actions → "iOS Preview (Simulator)" → Run workflow
#
# Artifacts: LostPhone-simulator.app.zip (Appetize) + PNG/MOV si simulateur OK

name: iOS Preview (Simulator)

on:
  workflow_dispatch:
    inputs:
      simulator:
        description: "Simulateur préféré (vide = auto). Ex: iPhone 15 Pro"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  preview:
    name: Build simulator + captures
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build & capture
        env:
          IOS_SIMULATOR_NAME: ${{ github.event.inputs.simulator }}
        run: |
          chmod +x LostPhone/scripts/ios-preview-capture.sh
          LostPhone/scripts/ios-preview-capture.sh "$GITHUB_WORKSPACE/preview-artifacts"

      - name: Upload preview artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-swiftui-preview-${{ github.run_number }}
          path: preview-artifacts/
          retention-days: 30
          if-no-files-found: error
