# Codemagic — build iOS sans Mac local
# Doc : https://docs.codemagic.io/yaml-quick-start/building-an-ionic-app/
# Guide : CURSOR-IPHONE.md

workflows:
  lost-phone-swiftui:
    name: Lost Phone SwiftUI
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        provisioning_profiles:
          - codemagic_profile
        certificates:
          - codemagic_certificate
      vars:
        BUNDLE_ID: "com.lostphone.game"
      xcode: latest

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
        - pattern: swiftui
          include: true

    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Sync LPSP stories
        script: |
          mkdir -p LostPhone/LostPhone/Resources/stories
          cp -R public/stories/* LostPhone/LostPhone/Resources/stories/

      - name: Generate Xcode project
        script: |
          cd LostPhone
          xcodegen generate

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build IPA
        script: |
          cd LostPhone
          xcode-project build-ipa \
            --project "LostPhone.xcodeproj" \
            --scheme "LostPhone"

    artifacts:
      - LostPhone/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - user@example.com
        notify:
          success: true
          failure: true

  lost-phone-ios:
    name: Lost Phone iOS
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        provisioning_profiles:
          - codemagic_profile
        certificates:
          - codemagic_certificate
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.lostphone.game"
      node: 20
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install npm dependencies
        script: npm ci

      - name: Build web + sync Capacitor
        script: npm run cap:sync:ios

      - name: Install CocoaPods
        script: |
          cd ios/App && pod install

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - user@example.com
        notify:
          success: true
          failure: true
