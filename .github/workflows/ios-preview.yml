# Aperçu SwiftUI sans Mac et sans Apple Developer.
# GitHub → Actions → "iOS Preview (Simulator)" → Run workflow
#
# Artifacts: LostPhone-simulator.app.zip (Appetize) + PNG/MOV si simulateur OK

name: iOS Preview (Simulator)

on:
  push:
    branches: [main]
    paths:
      - "LostPhone/**"
      - "public/stories/**"
      - ".github/workflows/ios-preview.yml"
      - "LostPhone/scripts/capture_spectr_references.py"
      - "LostPhone/scripts/compare_spectr_pixels.py"
  workflow_dispatch:
    inputs:
      simulator:
        description: "Simulateur préféré (vide = auto). Ex: iPhone 15 Pro"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  preview:
    name: Build simulator + captures
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # Netflix clone + SwiftUINavigation need Swift 6.2 / iOS 26 SDK (sharedBackgroundVisibility, @Entry).
          if [[ -d /Applications/Xcode_26.3.app ]]; then
            sudo xcode-select -s /Applications/Xcode_26.3.app
          elif [[ -d /Applications/Xcode_26.2.app ]]; then
            sudo xcode-select -s /Applications/Xcode_26.2.app
          elif [[ -d /Applications/Xcode_26.0.app ]]; then
            sudo xcode-select -s /Applications/Xcode_26.0.app
          else
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          fi
          xcodebuild -version

      - name: Skip macro validation (SwiftUI @Entry in vendored clones)
        run: defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build & capture
        env:
          IOS_SIMULATOR_NAME: ${{ github.event.inputs.simulator }}
        run: |
          chmod +x LostPhone/scripts/ios-preview-capture.sh
          LostPhone/scripts/ios-preview-capture.sh "$GITHUB_WORKSPACE/preview-artifacts"

      - name: Spectr pixel pipeline (A+B+C)
        run: |
          python3 -m pip install --quiet playwright pillow numpy
          python3 -m playwright install chromium
          python3 LostPhone/scripts/capture_spectr_references.py
          chmod +x LostPhone/scripts/ios-awesome-pixel-capture.sh
          LostPhone/scripts/ios-awesome-pixel-capture.sh \
            "$GITHUB_WORKSPACE/LostPhone/scripts/lpsp_pixel_captures" \
            "$(find "$GITHUB_WORKSPACE/LostPhone/.derivedData-preview" -name 'LostPhone.app' -type d | head -1)"
          python3 LostPhone/scripts/compare_spectr_pixels.py || true

      - name: Upload Spectr pixel diff report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spectr-pixel-report-${{ github.run_number }}
          path: |
            LostPhone/scripts/spectr_pixel_refs/
            LostPhone/scripts/lpsp_pixel_captures/
            LostPhone/scripts/spectr_pixel_report/
          retention-days: 90
          if-no-files-found: warn

      - name: Spectr pixel summary
        if: always()
        run: |
          if [[ -f LostPhone/scripts/spectr_pixel_report/report.md ]]; then
            echo "## Spectr pixel diff (61 apps — home tab)" >> "$GITHUB_STEP_SUMMARY"
            head -20 LostPhone/scripts/spectr_pixel_report/report.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Publish preview (Release)
        run: |
          gh release delete preview-latest -y 2>/dev/null || true
          gh release create preview-latest \
            preview-artifacts/LostPhone-simulator.app.zip \
            preview-artifacts/preview-demo.mov \
            preview-artifacts/01-menu-accueil.png \
            --title "Preview Lost Phone — vidéo + app" \
            --notes-file LostPhone/scripts/preview-release-notes.md
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish Appetize zip alias (legacy tag)
        run: |
          gh release delete appetize-latest -y 2>/dev/null || true
          gh release create appetize-latest \
            preview-artifacts/LostPhone-simulator.app.zip \
            --title "Appetize — zip simulateur" \
            --notes "Showroom : menu → **Showroom — 14 apps Reddit** (sans PIN). J-3 : PIN **1503**. PC/Mac + iOS **17.2**."
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload Appetize zip (upload THIS file to appetize.io)
        uses: actions/upload-artifact@v4
        with:
          name: appetize-upload-${{ github.run_number }}
          path: |
            preview-artifacts/LostPhone-simulator.app.zip
            preview-artifacts/APPETIZE-LISEZMOI.txt
          retention-days: 30
          if-no-files-found: error

      - name: Job summary
        run: |
          {
            echo "## Preview Lost Phone"
            echo ""
            echo "**Sans Appetize (recommandé)** : [preview-latest Release](https://github.com/${{ github.repository }}/releases/tag/preview-latest) → \`preview-demo.mov\`"
            echo ""
            echo "**Appetize** (PC/Mac uniquement) : [appetize-latest](https://github.com/${{ github.repository }}/releases/tag/appetize-latest) · iOS **17.2** · PIN **1503**"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload preview artifacts (screenshots + full bundle)
        uses: actions/upload-artifact@v4
        with:
          name: ios-swiftui-preview-${{ github.run_number }}
          path: preview-artifacts/
          retention-days: 30
          if-no-files-found: error
