# XcodeGen — Mac cloud : brew install xcodegen && cd game/LostPhone && xcodegen generate
name: LostPhone
options:
  bundleIdPrefix: com.lostphone
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher.git
    from: 8.0.0

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "11"

targets:
  LostPhone:
    type: application
    platform: iOS
    dependencies:
      - package: Kingfisher
    sources:
      - path: LostPhone
        excludes:
          - "**/Info.plist"
          - "**/Resources/stories/**"
          - "**/README.md"
          - "**/INTEGRATION.md"
          - "**/SOURCE.md"
          - "**/playground/**"
          - "**/_backup/**"
          # Sopheamen brut + Integrated : doublons de types ; runtime = Vendored/
          - "**/Sopheamen/**"
    resources:
      # Folder reference preserves stories/<id>/lpsp.json (avoids flattening duplicate lpsp.json).
      - path: LostPhone/Resources/stories
        type: folder
        buildPhase: resources
      - path: LostPhone/Apps/Vendored/Tinder/Resources/girls
        type: folder
        buildPhase: resources
      - path: LostPhone/Apps/Vendored/TikTok/Resources/TikTokIcons.ttf
        buildPhase: resources
    postBuildScripts:
      - name: Embed LPSP stories
        basedOnDependencyAnalysis: false
        script: |
          set -e
          APP="${BUILT_PRODUCTS_DIR}/${WRAPPER_NAME}"
          SRC="${SRCROOT}/LostPhone/Resources/stories"
          DST="${APP}/stories"
          if [ ! -d "$SRC" ]; then
            echo "error: missing $SRC" >&2
            exit 1
          fi
          rm -rf "$DST"
          mkdir -p "$DST"
          cp -R "$SRC/." "$DST/"
          echo "Embedded LPSP stories into $DST"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lostphone.game
        INFOPLIST_FILE: LostPhone/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: NO
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        GENERATE_INFOPLIST_FILE: NO
    scheme:
      testTargets: []
