# Codemagic — build iOS sans Mac local
# Doc : https://docs.codemagic.io/yaml-quick-start/building-an-ionic-app/
# Guide : CURSOR-IPHONE.md

workflows:
  lost-phone-swiftui:
    name: Lost Phone SwiftUI
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.lostphone.game
      vars:
        BUNDLE_ID: "com.lostphone.game"
        PROFILE_NAME: "Lost Phone App Store"
        PROFILES_DIR: "$HOME/Library/MobileDevice/Provisioning Profiles"
      xcode: latest

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
        - pattern: swiftui
          include: true

    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Sync LPSP stories
        script: |
          mkdir -p LostPhone/LostPhone/Resources/stories
          cp -R public/stories/* LostPhone/LostPhone/Resources/stories/

      - name: Generate Xcode project
        script: |
          cd LostPhone
          xcodegen generate

      - name: Ensure App Store provisioning profile
        script: |
          set -e
          mkdir -p "$PROFILES_DIR"
          export PROFILES_DIRECTORY="$PROFILES_DIR"
          PROFILE_JSON=$(app-store-connect profiles list \
            --type IOS_APP_STORE \
            --name "$PROFILE_NAME" \
            --state ACTIVE \
            --json)
          if [ "$PROFILE_JSON" = "[]" ]; then
            BUNDLE_ID_RES=$(app-store-connect bundle-ids list \
              --bundle-id-identifier "$BUNDLE_ID" \
              --strict-match-identifier \
              --json | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['id'])")
            CERT_ID=$(app-store-connect certificates list \
              --type IOS_DISTRIBUTION \
              --json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['id'])")
            app-store-connect profiles create "$BUNDLE_ID_RES" \
              --type IOS_APP_STORE \
              --name "$PROFILE_NAME" \
              --certificate-ids "$CERT_ID" \
              --save
          else
            app-store-connect profiles list \
              --type IOS_APP_STORE \
              --name "$PROFILE_NAME" \
              --state ACTIVE \
              --save
          fi

      - name: Set up code signing
        script: |
          xcode-project use-profiles \
            --project LostPhone/LostPhone.xcodeproj \
            --custom-export-options='{"testFlightInternalTestingOnly": true}'

      - name: Build IPA
        script: |
          cd LostPhone
          xcode-project build-ipa \
            --project "LostPhone.xcodeproj" \
            --scheme "LostPhone"

    artifacts:
      - LostPhone/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  lost-phone-ios:
    name: Lost Phone iOS
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        provisioning_profiles:
          - codemagic_profile
        certificates:
          - codemagic_certificate
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.lostphone.game"
      node: 20
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install npm dependencies
        script: npm ci

      - name: Build web + sync Capacitor
        script: npm run cap:sync:ios

      - name: Install CocoaPods
        script: |
          cd ios/App && pod install

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - user@example.com
        notify:
          success: true
          failure: true
